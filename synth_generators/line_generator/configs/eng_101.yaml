sample_alphabet: " 0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"
space_char: " "
samples: 100000
output_dir: ../../../data
chunk_size: 1024
num_workers: 4
overwrite: false
save_dense_targets: true
save_binary_gap_targets: true
binary_gap_min_width: 1
binary_gap_include_spaces: false
binary_gap_include_margins: false
image_height: 48
image_width: 64
min_text_length: 4
max_text_length: 16
line_crops: true
word_count_min: 6
word_count_max: 18
word_length_min: 2
word_length_max: 8
crop_stride: 64
min_crop_text_length: 1
font_dir: ../fonts
font_extensions:
  - .ttf
  - .otf
  - .ttc
  - .otc
font_size_min: 24
font_size_max: 34
char_spacing_min: -0.4
char_spacing_max: 1.6
word_spacing_multiplier_min: 0.75
word_spacing_multiplier_max: 1.7
channels: 1
seed: 42
background_dir: ../backgrounds
background_extensions:
  - .png
  - .jpg
  - .jpeg
  - .bmp
  - .webp
horizontal_padding: 8
