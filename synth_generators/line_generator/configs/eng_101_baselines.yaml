sample_alphabet: " 0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"
space_char: " "
samples: 10000
output_dir: ../../../data
chunk_size: 1024
num_workers: 4
overwrite: false
save_dense_targets: false
save_cut_projection_targets: false
save_baseline_targets: true
baseline_target_radius: 1
image_height: 48
image_width: 128
min_text_length: 4
max_text_length: 16
line_crops: true
word_count_min: 6
word_count_max: 18
word_length_min: 2
word_length_max: 8
crop_stride: 96
min_crop_text_length: 1
edge_char_min_visible_ratio: 0.75
edge_fragment_max_visible_ratio: 0.25
neighbor_lines_probability: 0.7
neighbor_line_min_crop_ratio: 0.65
neighbor_line_visible_ratio_min: 0.06
neighbor_line_gap_min: 0
neighbor_line_gap_max: 5
font_dir: ../fonts
font_extensions:
  - .ttf
  - .otf
  - .ttc
  - .otc
font_size_min: 24
font_size_max: 34
char_spacing_min: -0.4
char_spacing_max: 1.8
word_spacing_multiplier_min: 0.65
word_spacing_multiplier_max: 2.2
channels: 1
seed: 42
background_dir: ../backgrounds
background_extensions:
  - .png
  - .jpg
  - .jpeg
  - .bmp
  - .webp
horizontal_padding: 8
