chunks_dir: ../data/eng_101_cuts
architecture: residual_temporal_fcn
architecture_params:
  base_channels: 16
  height_levels: 4
  temporal_blocks: 3
  temporal_kernel: 5
  temporal_dilations: [1, 2, 4]
  dropout: 0.05

epochs: 50
batch_size: 512
batch_count: 100
lr: 0.001
optimizer: adam
weight_decay: 0.0
scheduler: reduce_on_plateau
scheduler_factor: 0.5
scheduler_patience: 3
scheduler_min_lr: 0.000001
scheduler_threshold: 0.0001
scheduler_cooldown: 0
checkpoint_dir: ../checkpoints/cut_segmentator_residual
max_train_batches: null
max_val_batches: 50
val_fraction: 0.1
seed: 42
resume: false

loss_mode: cut_projection
cut_projection_crop_left: 0
cut_projection_crop_right: 0
cut_projection_strict_width: true
cut_projection_loss: mse
cut_projection_positive_weight: 4.0
segmentator_cut_threshold: 0.35
segmentator_peak_min_distance: 3
segmentator_cut_postprocess: widths
segmentator_cut_min_width: 3
segmentator_cut_max_width: 24
segmentator_cut_candidate_threshold: 0.12
segmentator_cut_smooth_radius: 1

num_workers: 0
drop_last: false
prefetch_factor: 2
persistent_workers: true
chunk_cache_size: 2
chunk_aware_batches: true

log_every: 1
preview_samples: 5
preview_dir: ../output/cut_segmentator_residual

gpu_augmentations: true
gpu_augment_val: false
augmentation_probabilities:
  cycle_shift: 0.0
  preprocess_geometry: 0.0
  strong_blur: 0.18
  motion_blur: 0.28
  scale: 0.0
  darkening: 0.55
  noise: 0.85
  projective: 0.0
  rotate: 0.0
  crop_x: 0.0
  crop_y: 0.0
  random_line: 0.22
  morphology: 0.18
  unsharp_mask: 0.3
  gaussian_blur: 0.0
  gaussian_noise: 0.0
  brightness: 0.4
  contrast: 0.45
  invert: 0.0
augmentations:
  strong_blur:
    radius_min: 0.8
    radius_max: 1.8
  motion_blur:
    size_min: 3
    size_max: 8
    angle_min: -10.0
    angle_max: 10.0
  darkening:
    factor_min: 0.35
    factor_max: 1.0
  noise:
    kind: gaussian
    std_min: 1.5
    std_max: 12.0
  random_line:
    angle_degrees_min: -4.0
    angle_degrees_max: 4.0
    line_width_min: 1.0
    line_width_max: 2.5
    alpha_min: 0.35
    alpha_max: 0.9
    value_min: 0.0
    value_max: 80.0
    y_min: 0.15
    y_max: 0.9
  morphology:
    operation: random
    size: 3
  unsharp_mask:
    radius: 1.2
    percent_min: 100
    percent_max: 220
    threshold: 3
  brightness:
    factor_min: 0.75
    factor_max: 1.25
  contrast:
    factor_min: 0.75
    factor_max: 1.4
