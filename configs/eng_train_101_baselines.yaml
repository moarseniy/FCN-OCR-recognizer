chunks_dir: ../data/eng_101_baselines
architecture: baseline_detector_fcn
architecture_params:
  base_channels: 24
  depth: 6
  dropout: 0.05

epochs: 50
batch_size: 256
batch_count: 200
lr: 0.001
optimizer: adamw
weight_decay: 0.0001
scheduler: reduce_on_plateau
scheduler_factor: 0.5
scheduler_patience: 3
scheduler_min_lr: 0.000001
scheduler_threshold: 0.0001
scheduler_cooldown: 0
checkpoint_dir: ../checkpoints/baseline_detector
max_train_batches: null
max_val_batches: 50
val_fraction: 0.1
seed: 42
resume: false

loss_mode: baseline_heatmap
baseline_heatmap_strict_size: true
baseline_heatmap_loss: bce
baseline_heatmap_positive_weight: 6.0

num_workers: 0
drop_last: false
prefetch_factor: 2
persistent_workers: true
chunk_cache_size: 2
chunk_aware_batches: true

log_every: 1
preview_samples: 5
preview_dir: ../output/baseline_detector

gpu_augmentations: true
gpu_augment_val: false
augmentation_probabilities:
  cycle_shift: 0.20
  preprocess_geometry: 0.45
  strong_blur: 0.15
  motion_blur: 0.20
  scale: 0.20
  darkening: 0.45
  noise: 0.75
  projective: 0.20
  rotate: 0.55
  x_pad: 0.15
  crop_x: 0.15
  crop_y: 0.20
  rescale_quality: 0.25
  random_line: 0.35
  morphology: 0.15
  unsharp_mask: 0.20
  gaussian_blur: 0.0
  gaussian_noise: 0.0
  brightness: 0.35
  contrast: 0.35
  invert: 0.0
augmentations:
  cycle_shift:
    max_x: 8
    max_y: 4
  preprocess_geometry:
    scale_x_min: -0.12
    scale_x_max: 0.16
    y_pad_min: -0.20
    y_pad_max: 0.16
    fillcolor: 255
  strong_blur:
    radius_min: 0.6
    radius_max: 1.6
  motion_blur:
    size_min: 3
    size_max: 7
    angle_min: -8.0
    angle_max: 8.0
  scale:
    factor_x_min: 0.85
    factor_x_max: 1.15
    factor_y_min: 0.82
    factor_y_max: 1.18
    fillcolor: 255
  darkening:
    factor_min: 0.40
    factor_max: 1.0
  noise:
    kind: gaussian
    std_min: 1.5
    std_max: 10.0
  projective:
    max_dx: 5.0
    max_dy: 3.0
    fillcolor: 255
  rotate:
    max_degrees: 6.0
    fillcolor: 255
  x_pad:
    pad_min: 0.02
    pad_max: 0.08
    fillcolor: 255
    resize_mode: bilinear
  crop_x:
    max_left: 6
    max_right: 6
    fillcolor: 255
  crop_y:
    max_top: 4
    max_bottom: 4
    fillcolor: 255
  rescale_quality:
    factor_min: 0.35
    factor_max: 0.75
    down_mode: bilinear
    up_mode: nearest
  random_line:
    angle_degrees_min: -5.0
    angle_degrees_max: 5.0
    line_width_min: 1.0
    line_width_max: 3.0
    alpha_min: 0.35
    alpha_max: 0.9
    value_min: 0.0
    value_max: 90.0
    y_min: 0.0
    y_max: 1.0
  morphology:
    operation: random
    size: 3
  unsharp_mask:
    radius: 1.2
    percent_min: 100
    percent_max: 220
    threshold: 3
  brightness:
    factor_min: 0.75
    factor_max: 1.25
  contrast:
    factor_min: 0.75
    factor_max: 1.4
  invert: {}
