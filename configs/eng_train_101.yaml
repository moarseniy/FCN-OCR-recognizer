chunks_dir: ../data/eng_101
generator_config: null

epochs: 50
batch_size: 1024
batch_count: 100
lr: 0.001
checkpoint_dir: ../checkpoints
max_train_batches: null
max_val_batches: 50
val_fraction: 0.1
seed: 42
resume: false

num_workers: 0
drop_last: false
prefetch_factor: 2
persistent_workers: true
chunk_cache_size: 2
chunk_aware_batches: true

log_every: 1
preview_samples: 5
preview_dir: ../output

gpu_augmentations: true
gpu_augment_val: false
augmentation_probabilities:
  cycle_shift: 0.15
  strong_blur: 0.18
  motion_blur: 0.28
  scale: 0.28
  darkening: 0.55
  noise: 0.85
  projective: 0.25
  rotate: 0.85
  crop_x: 0.45
  crop_y: 0.35
  morphology: 0.18
  unsharp_mask: 0.3
  gaussian_blur: 0.0
  gaussian_noise: 0.0
  brightness: 0.4
  contrast: 0.45
  invert: 0.0
augmentations:
  cycle_shift:
    max_x: 8
    max_y: 5
  strong_blur:
    radius_min: 0.8
    radius_max: 1.8
  motion_blur:
    size_min: 3
    size_max: 8
    angle_min: -10.0
    angle_max: 10.0
  scale:
    factor_x_min: 0.8
    factor_x_max: 1.15
    factor_y_min: 0.8
    factor_y_max: 1.18
    fillcolor: 255
  darkening:
    factor_min: 0.35
    factor_max: 1.0
  noise:
    kind: gaussian
    std_min: 1.5
    std_max: 12.0
  projective:
    max_dx: 6.0
    max_dy: 4.0
    fillcolor: 255
  rotate:
    max_degrees: 8.0
    fillcolor: 255
  crop_x:
    max_left: 6
    max_right: 6
    fillcolor: 255
  crop_y:
    max_top: 3
    max_bottom: 3
    fillcolor: 255
  morphology:
    operation: random
    size: 3
  unsharp_mask:
    radius: 1.2
    percent_min: 100
    percent_max: 220
    threshold: 3
  gaussian_blur:
    radius_min: 0.0
    radius_max: 0.25
  gaussian_noise:
    std_min: 0.0
    std_max: 5.0
  brightness:
    factor_min: 0.75
    factor_max: 1.25
  contrast:
    factor_min: 0.75
    factor_max: 1.4
  invert: {}
